<svg viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="BANNIN">
  <defs>
    <linearGradient id="bannin-armor" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#7dd3fc"/>
      <stop offset="55%" stop-color="#22b8cf"/>
      <stop offset="100%" stop-color="#0e7490"/>
    </linearGradient>
    <linearGradient id="bannin-horn" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f5d78e"/>
      <stop offset="100%" stop-color="#c9971f"/>
    </linearGradient>
  </defs>

  <!-- kuwagata (crest horns) -->
  <path d="M32 20 C 27 12, 19 8, 12 10 C 17 15, 20 20, 23 26 Z" fill="url(#bannin-horn)"/>
  <path d="M32 20 C 37 12, 45 8, 52 10 C 47 15, 44 20, 41 26 Z" fill="url(#bannin-horn)"/>

  <!-- shield / kabuto body -->
  <path d="M32 14
           L50 21 L50 34
           C 50 46, 42 54, 32 58
           C 22 54, 14 46, 14 34
           L14 21 Z"
        fill="url(#bannin-armor)" opacity="0.16"/>
  <path d="M32 14
           L50 21 L50 34
           C 50 46, 42 54, 32 58
           C 22 54, 14 46, 14 34
           L14 21 Z"
        fill="none" stroke="url(#bannin-armor)" stroke-width="2"/>

  <!-- helmet bowl -->
  <path d="M32 24 C 24 24, 19 29, 19 35 L19 37 L45 37 L45 35 C 45 29, 40 24, 32 24 Z"
        fill="url(#bannin-armor)"/>
  <path d="M19 37 C 19 41.5, 25 43.5, 32 43.5 C 39 43.5, 45 41.5, 45 37" fill="none" stroke="url(#bannin-armor)" stroke-width="1.6"/>

  <!-- lamellar plates (dou) -->
  <path d="M21 45 L43 45 L41 49 L23 49 Z" fill="url(#bannin-armor)" opacity="0.85"/>
  <path d="M23 50 L41 50 L39.5 54 L24.5 54 Z" fill="url(#bannin-armor)" opacity="0.7"/>

  <!-- lock crest -->
  <rect x="27.5" y="15" width="9" height="7.5" rx="1.6" fill="#0b1220"/>
  <path d="M29.3 15 v-2.4 a2.7 2.7 0 0 1 5.4 0 v2.4" fill="none" stroke="#0b1220" stroke-width="2"/>
  <circle cx="32" cy="18.4" r="1.15" fill="#7dd3fc"/>
</svg>
