# Example BANNIN configuration (YAML, loaded via Viper — internal/config).
# Load with: bannin scan --config configs/bannin.example.yaml
#
# scan, logging, policy, and report (json + html formats, output_dir)
# are all live. policy.fail_on_severity gates the exit code: any finding
# at or above it fails the scan (one of: low, medium, high, critical;
# set "" to disable gating). report.formats: "json" and "html" render
# today — sarif is accepted but ignored until its milestone.
# storage.driver: sqlite (the default) persists every scan to dsn;
# postgres is accepted by validation but not implemented yet. server
# configures `bannin serve`, which serves that history when driver is
# sqlite, or falls back to report.output_dir's report.json (most
# recent scan only) otherwise. server.auth_token requires a Bearer
# credential on the dashboard API (every route except /healthz); leave
# empty only on a host you already trust. Prefer the BANNIN_AUTH_TOKEN
# env var over committing a token to this file.

scan:
  target: "."
  plugins:
    - semgrep
    - osv
    - trivy
    - gitleaks

report:
  formats: ["html", "json"]
  output_dir: "./bannin-report"

policy:
  fail_on_severity: "high"

storage:
  driver: "sqlite"
  dsn: "./bannin.db"

server:
  host: "127.0.0.1"
  port: 8080
  auth_token: ""

logging:
  level: "info"

# OWASP ZAP (DAST) scan depth, applied to URL targets (from the CLI or
# the dashboard's New Scan page). "quick" (default) is a fast spider +
# light active scan that surfaces mostly header/config hygiene issues.
# "full" drives ZAP's full active-scan policy to probe for injection-
# class vulnerabilities (SQLi, XSS, command injection) — much deeper,
# but also much slower and far more aggressive against the target, so
# only point it at systems you're authorized to actively scan.
zap:
  mode: "quick"
  # ajax: true adds ZAP's AJAX spider (a real headless browser crawl) to
  # a full scan so JavaScript single-page apps get discovered — the plain
  # spider only sees links in static HTML. Needs Chrome/Chromium/Firefox
  # installed (install-tools.sh sets one up). Ignored in quick mode.
  ajax: false
  browser: "chrome-headless" # or firefox-headless

  # auth: scan pages behind a login (full mode only). Pick a method:
  #   form    — POST username/password to login_url (classic web apps)
  #   json    — POST credentials as JSON (SPA / API backends)
  #   header  — send a static header on every request (token/API auth)
  #   browser — drive the headless browser to log in (JS-heavy apps)
  # Credentials are SECRETS — set them via environment variables, not here:
  #   BANNIN_ZAP_AUTH_USERNAME, BANNIN_ZAP_AUTH_PASSWORD, BANNIN_ZAP_AUTH_TOKEN
  # logged_in_regex / logged_out_regex let ZAP detect when the session
  # drops and re-login; supplying one greatly improves coverage.
  auth:
    method: "" # "" = unauthenticated (default)
    login_url: ""
    username: ""
    # password: via BANNIN_ZAP_AUTH_PASSWORD
    username_field: "username"
    password_field: "password"
    header: "Authorization" # header method: header name
    # token: via BANNIN_ZAP_AUTH_TOKEN  (e.g. "Bearer eyJ...")
    logged_in_regex: ""
    logged_out_regex: ""
